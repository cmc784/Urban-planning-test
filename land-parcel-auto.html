<script>
// ═══════════════════════════════════════════════════════
// 1. ZIP / SHP / DBF 파싱 (원본 로직 100% 복구)
// ═══════════════════════════════════════════════════════

function listZipFiles(buffer) {
  const bytes = new Uint8Array(buffer);
  const entries = [];
  const sig = [0x50,0x4B,0x03,0x04];
  let i = 0;
  while (i < bytes.length - 30) {
    if (bytes[i]===sig[0]&&bytes[i+1]===sig[1]&&bytes[i+2]===sig[2]&&bytes[i+3]===sig[3]) {
      const compMethod = bytes[i+8]|(bytes[i+9]<<8);
      const compSize   = bytes[i+18]|(bytes[i+19]<<8)|(bytes[i+20]<<16)|(bytes[i+21]<<24);
      const uncompSize = bytes[i+22]|(bytes[i+23]<<8)|(bytes[i+24]<<16)|(bytes[i+25]<<24);
      const fnLen      = bytes[i+26]|(bytes[i+27]<<8);
      const exLen      = bytes[i+28]|(bytes[i+29]<<8);
      const fname      = new TextDecoder('utf-8').decode(bytes.slice(i+30, i+30+fnLen));
      const dataStart  = i+30+fnLen+exLen;
      entries.push({ name:fname, compMethod, compSize, uncompSize, dataStart });
      i = dataStart + compSize;
    } else { i++; }
  }
  return entries;
}

async function extractZipEntry(buffer, entry) {
  const raw = new Uint8Array(buffer, entry.dataStart, entry.compSize);
  if (entry.compMethod === 0) {
    const out = new Uint8Array(entry.compSize);
    out.set(raw); return out.buffer;
  }
  if (entry.compMethod === 8) {
    const ds = new DecompressionStream('deflate-raw');
    const w = ds.writable.getWriter(); w.write(raw); w.close();
    const r = ds.readable.getReader();
    const chunks = []; let total = 0;
    while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);total+=value.length;}
    const out = new Uint8Array(total); let off=0;
    for(const c of chunks){out.set(c,off);off+=c.length;}
    return out.buffer;
  }
  throw new Error('지원하지 않는 ZIP 압축 방식: '+entry.compMethod);
}

function shoelaceSigned(ring) {
  let a=0; const n=ring.length;
  for(let i=0,j=n-1;i<n;j=i++) a+=(ring[j][0]+ring[i][0])*(ring[j][1]-ring[i][1]);
  return a/2;
}

function parseShp(buffer) {
  const view = new DataView(buffer);
  const geometries = [];
  let offset = 100;
  while (offset + 8 <= buffer.byteLength) {
    const contentLen = view.getInt32(offset+4, false) * 2;
    offset += 8;
    if (offset + contentLen > buffer.byteLength) break;
    const type = view.getInt32(offset, true);
    if (type === 0) { geometries.push(null); offset += contentLen; continue; }
    if (type===5||type===15||type===25) {
      let pos = offset+4+32;
      const numParts  = view.getInt32(pos, true); pos+=4;
      const numPoints = view.getInt32(pos, true); pos+=4;
      const parts = [];
      for(let p=0;p<numParts;p++){parts.push(view.getInt32(pos,true));pos+=4;}
      const pts = [];
      for(let p=0;p<numPoints;p++){
        const x=view.getFloat64(pos,true);pos+=8;
        const y=view.getFloat64(pos,true);pos+=8;
        pts.push([x,y]);
      }
      const rings=[];
      for(let p=0;p<numParts;p++){
        const s=parts[p],e=p+1<numParts?parts[p+1]:numPoints;
        rings.push(pts.slice(s,e));
      }
      const polys=[];
      for(const ring of rings){
        if(shoelaceSigned(ring)>=0) polys.push([ring]);
        else if(polys.length>0) polys[polys.length-1].push(ring);
      }
      if(polys.length===0) polys.push([rings[0]||[]]);
      if(polys.length===1) geometries.push({type:'Polygon',coordinates:polys[0]});
      else geometries.push({type:'MultiPolygon',coordinates:polys});
    } else {
      geometries.push(null);
    }
    offset += contentLen;
  }
  return geometries;
}

function parseDbf(buffer) {
  const view  = new DataView(buffer);
  const nRec  = view.getInt32(4, true);
  const hLen  = view.getInt16(8, true);
  const fields=[];
  let pos=32;
  while(pos<hLen-1){
    const nb=new Uint8Array(buffer,pos,11);
    const name=new TextDecoder('ascii').decode(nb).replace(/\0/g,'').trim();
    if(!name)break;
    const type=String.fromCharCode(new Uint8Array(buffer,pos+11,1)[0]);
    const len =new Uint8Array(buffer,pos+16,1)[0];
    fields.push({name,type,len});
    pos+=32;
  }
  const records=[];
  let rOff=hLen;
  const decKr=new TextDecoder('euc-kr');
  for(let r=0;r<nRec;r++){
    const del=new Uint8Array(buffer,rOff,1)[0]; rOff++;
    const rec={};
    for(const f of fields){
      const raw=new Uint8Array(buffer,rOff,f.len); rOff+=f.len;
      let val;
      try{val=decKr.decode(raw).trim();}catch(e){val=new TextDecoder('utf-8').decode(raw).trim();}
      if(f.type==='N'||f.type==='F')val=val===''?null:Number(val);
      rec[f.name]=val;
    }
    if(del!==0x2A)records.push(rec);
  }
  return records;
}

async function parseShpZip(buffer) {
  const entries = listZipFiles(buffer);
  const find = ext => entries.find(e=>e.name.toLowerCase().endsWith(ext));
  const shpE = find('.shp');
  const dbfE = find('.dbf');
  if(!shpE) throw new Error('.shp 파일을 찾을 수 없습니다.');
  const shpBuf = await extractZipEntry(buffer, shpE);
  const geoms  = parseShp(shpBuf);
  let recs = [];
  if(dbfE){ const dbfBuf=await extractZipEntry(buffer,dbfE); recs=parseDbf(dbfBuf); }
  const features = geoms
    .map((g,i)=>({type:'Feature',geometry:g,properties:recs[i]||{}}))
    .filter(f=>f.geometry);
  return {type:'FeatureCollection',features};
}

// ═══════════════════════════════════════════════════════
// 2. JSTS 기반 기하 연산 (Clip 문제 해결 핵심)
// ═══════════════════════════════════════════════════════

const reader = new jsts.io.GeoJSONReader();
const writer = new jsts.io.GeoJSONWriter();

function shoelaceArea(ring) {
  let area = 0;
  const n = ring.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    area += ring[i][0] * ring[j][1] - ring[j][0] * ring[i][1];
  }
  return Math.abs(area) / 2;
}

function planarArea(geometry) {
  if (!geometry) return 0;
  let total = 0;
  if (geometry.type === 'Polygon') {
    total = shoelaceArea(geometry.coordinates[0]);
    for (let i = 1; i < geometry.coordinates.length; i++) total -= shoelaceArea(geometry.coordinates[i]);
  } else if (geometry.type === 'MultiPolygon') {
    for (const poly of geometry.coordinates) {
      total += shoelaceArea(poly[0]);
      for (let i = 1; i < poly.length; i++) total -= shoelaceArea(poly[i]);
    }
  }
  return Math.max(total, 0);
}

<script>
// ═══════════════════════════════════════════════════════
// 4. 핵심 로직 (원본 파싱 + JSTS Clip)
// ═══════════════════════════════════════════════════════

let shpJijukGeo = null;
let shpGuyeokGeo = null;
let shpStep1Rows = [];
let shpResultRows = [];
let BJD = null;
let shpMap = null;

const JIMOK_CHARS = ['대','공','장','학','주','창','도','철','제','천','구','유','수','양','어','원','당','사','묘','불','잡','전','답','과','목','임','광','염'];

window.onload = () => {
  fetch('bjd_data.js')
    .then(r => r.text())
    .then(text => {
      const match = text.match(/window\.BJD(?:_DATA)?\s*=\s*(.+);?$/s);
      if (match) {
        BJD = JSON.parse(match[1].trim().replace(/;$/,''));
      }
    }).catch(e => console.error('BJD 로드 실패', e));
};

function switchMode(mode) {
  document.getElementById('shpMode').style.display = mode === 'shp' ? 'block' : 'none';
  document.getElementById('xlsxMode').style.display = mode === 'xlsx' ? 'block' : 'none';
}

function parsePNUInfo(pnu) {
  const s = String(pnu || '').replace(/[^0-9]/g, '').padStart(19, '0');
  const bjdCode = s.slice(0, 10);
  const dCd = s[10];
  const bon = parseInt(s.slice(11, 15)) || 0;
  const bu  = parseInt(s.slice(15, 19)) || 0;
  const jibunPNU = (dCd === '2' ? '산' : '') + bon + (bu > 0 ? `-${bu}` : '');
  let sido = '', sigungu = '', emd = '';
  if (BJD && BJD.map && BJD.map[bjdCode]) {
    const [si, sg, em] = BJD.map[bjdCode];
    sido    = si >= 0 ? BJD.s[si]    : '';
    sigungu = sg >= 0 ? BJD.sg[sg]   : '';
    emd     = em >= 0 ? BJD.e[em]    : '';
  }
  return { pnu: s, sido, sigungu, emd, daejang: dCd === '2' ? '산' : '일반', jibunPNU };
}

async function processJijukShp(file) {
  const logEl = document.getElementById('shp1LogArea');
  const barEl = document.getElementById('shp1Bar');
  document.getElementById('shp1Progress').style.display = 'block';
  document.getElementById('jijukResult').style.display  = 'none';
  logEl.innerHTML = ''; barEl.style.width = '0%';
  const log = (m) => { logEl.innerHTML += m + '<br>'; };
  const bar = (p) => { barEl.style.width = p + '%'; };

  try {
    log('▸ SHP 파일 읽는 중...');
    const geojson = await parseShpZip(await file.arrayBuffer());
    shpJijukGeo = geojson;
    shpStep1Rows = [];

    log('▸ 필지 분석 중...');
    const total = geojson.features.length;
    for (let i = 0; i < total; i++) {
      if (i % 300 === 0) { bar(Math.round(i/total*100)); await new Promise(r=>setTimeout(r,0)); }
      const feat  = geojson.features[i];
      const props = feat.properties || {};
      const pnuRaw = String(props['PNU']||props['pnu']||props['PNUCD']||props['필지고유']||'').replace(/[^0-9]/g,'');
      const info = parsePNUInfo(pnuRaw);
      const jibunRaw = String(props['JIBUN']||props['jibun']||props['지번']||'').trim();
      let jibun = info.jibunPNU, jimok = '';
      if (jibunRaw) {
        const last = jibunRaw[jibunRaw.length-1];
        if (JIMOK_CHARS.includes(last)) { jimok=last; jibun=jibunRaw.slice(0,-1).trim(); }
        else jibun = jibunRaw;
      }
      if (!jimok) jimok = String(props['JMCD']||props['지목']||props['JIMOK']||'');
      const jijuArea = Math.round(planarArea(feat.geometry)*10)/10;
      shpStep1Rows.push({ ...info, jibun, jimok, jijuArea, geometry:feat.geometry });
    }
    bar(100);
    document.getElementById('jijukSummary').innerHTML = `<strong>${shpStep1Rows.length.toLocaleString()}개 필지</strong> 분석 완료 (합계: ${Math.round(shpStep1Rows.reduce((s,r)=>s+r.jijuArea,0)).toLocaleString()}㎡)`;
    
    const preview = shpStep1Rows.slice(0,5);
    document.getElementById('jijukPreviewTable').innerHTML = `
      <thead><tr><th>PNU</th><th>시도</th><th>시군구</th><th>읍면동</th><th>지번</th><th>지목</th><th>면적</th></tr></thead>
      <tbody>${preview.map(r=>`<tr><td>${r.pnu}</td><td>${r.sido}</td><td>${r.sigungu}</td><td>${r.emd}</td><td>${r.jibun}</td><td>${r.jimok}</td><td>${r.jijuArea}</td></tr>`).join('')}</tbody>
    `;
    
    document.getElementById('jijukResult').style.display = 'block';
    document.getElementById('shpBtn1Next').disabled = false;
    document.getElementById('jijukIcon').textContent = '✅';
  } catch(e) { log(`❌ 오류: ${e.message}`); }
}

async function processGuyeokShp(file) {
  const logEl = document.getElementById('shp2LogArea');
  const barEl = document.getElementById('shp2Bar');
  document.getElementById('shp2Progress').style.display = 'block';
  document.getElementById('guyeokResult').style.display = 'none';
  logEl.innerHTML = ''; barEl.style.width = '0%';
  const log = (m) => { logEl.innerHTML += m + '<br>'; };
  const bar = (p) => { barEl.style.width = p + '%'; };

  try {
    log('▸ 구역계 파일 읽는 중...');
    const geojson = await parseShpZip(await file.arrayBuffer());
    
    log('▸ 구역계 통합 중...');
    let guyeokJsts = null;
    for (const feat of geojson.features) {
      if (!feat.geometry) continue;
      const g = reader.read(feat.geometry);
      guyeokJsts = guyeokJsts ? guyeokJsts.union(g) : g;
    }

    log('▸ 교차분석(Clip) 중...');
    const total = shpStep1Rows.length;
    shpResultRows = [];
    for (let i = 0; i < total; i++) {
      if (i % 200 === 0) { bar(Math.round(i/total*100)); await new Promise(r=>setTimeout(r,0)); }
      const row = shpStep1Rows[i];
      try {
        const parcelJsts = reader.read(row.geometry);
        if (!parcelJsts.intersects(guyeokJsts)) continue;
        const intersectionJsts = parcelJsts.intersection(guyeokJsts);
        if (intersectionJsts.isEmpty()) continue;

        const intersectionGeo = writer.write(intersectionJsts);
        let pyeonipArea = Math.round(planarArea(intersectionGeo)*10)/10;
        if (pyeonipArea < 0.5) continue;

        const diffRatio = Math.abs(row.jijuArea - pyeonipArea) / (row.jijuArea || 1);
        const gubun = diffRatio < 0.01 ? '완전편입' : '부분편입';
        shpResultRows.push({ ...row, pyeonipArea, gubun, clippedGeo: intersectionGeo });
      } catch(e) {}
    }
    bar(100);
    document.getElementById('guyeokSummary').innerHTML = `<strong>${shpResultRows.length.toLocaleString()}개 필지</strong> 편입 확인 완료`;
    document.getElementById('guyeokResult').style.display = 'block';
    document.getElementById('shpBtn2Next').disabled = false;
    document.getElementById('guyeokIcon').textContent = '✅';
  } catch(e) { log(`❌ 오류: ${e.message}`); }
}

function shpGoStep(step) {
  document.querySelectorAll('.step-panel').forEach(el => el.classList.remove('active'));
  document.getElementById(`shp-panel${step}`).classList.add('active');
  document.querySelectorAll('.sp-item').forEach((el, i) => {
    if (i+1 === step) el.classList.add('active');
    else el.classList.remove('active');
  });
  if (step === 3) {
    renderShpResult();
    initMap();
  }
}

function renderShpResult() {
  const tbody = document.getElementById('shpResultBody');
  tbody.innerHTML = shpResultRows.map((r, i) => `
    <tr>
      <td style="font-family:monospace; font-size:10px">${r.pnu}</td>
      <td>${i+1}</td>
      <td>${r.sido}</td><td>${r.sigungu}</td><td>${r.emd}</td>
      <td>${r.daejang}</td><td>${r.jibun}</td><td>${r.jimok}</td>
      <td>${r.jijuArea.toLocaleString()}</td>
      <td>${r.pyeonipArea.toLocaleString()}</td>
      <td><span class="status-badge ${r.gubun==='완전편입'?'s-완편':'s-일편'}">${r.gubun}</span></td>
    </tr>
  `).join('');

  document.getElementById('sr-count').textContent = shpResultRows.length.toLocaleString();
  document.getElementById('sr-area').textContent = Math.round(shpResultRows.reduce((s,r)=>s+r.jijuArea,0)).toLocaleString();
  document.getElementById('sr-pyeonip').textContent = Math.round(shpResultRows.reduce((s,r)=>s+r.pyeonipArea,0)).toLocaleString();
  document.getElementById('sr-full').textContent = shpResultRows.filter(r=>r.gubun==='완전편입').length;
  document.getElementById('sr-part').textContent = shpResultRows.filter(r=>r.gubun==='부분편입').length;
}

function initMap() {
  if (shpMap) return;
  shpMap = L.map('shpMap').setView([37.5, 127], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(shpMap);
  // Note: Coordinates are EPSG:5174, so they won't show correctly on OSM without projection.
  // This is a placeholder for the original map UI.
}

function exportShpExcel() {
  const data = shpResultRows.map(r => ({
    "PNU": r.pnu, "시도": r.sido, "시군구": r.sigungu, "읍면동": r.emd, "지번": r.jibun+r.jimok,
    "필지면적": r.jijuArea, "편입면적": r.pyeonipArea, "구분": r.gubun
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "편입토지조서");
  XLSX.writeFile(wb, "편입토지조서_결과.xlsx");
}
